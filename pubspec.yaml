name: mastertool
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: 3.3.1
  riverpod_annotation: 4.0.2

  # Serialization
  freezed_annotation: 3.1.0
  json_annotation: 4.12.0

  # Navigation
  go_router: 17.2.3

  # Network
  dio: 5.9.2
  connectivity_plus: 7.1.1

  # Storage
  shared_preferences: 2.5.5
  flutter_secure_storage: 10.3.1
  path_provider: 2.1.5

  # UI
  cached_network_image: 3.4.1
  shimmer: 3.0.0
  flutter_svg: 2.3.0
  lottie: 3.3.3

  # Firebase
  firebase_core: 4.9.0
  firebase_crashlytics: 5.2.2
  firebase_analytics: 12.4.1
  firebase_messaging: 16.2.2
  firebase_remote_config: 6.5.1

  # Monitoring
  sentry_flutter: 8.14.2

  # Device
  package_info_plus: 10.1.0
  device_info_plus: 13.1.0
  permission_handler: 12.0.1
  url_launcher: 6.3.2
  share_plus: 13.1.0
  local_auth: 3.0.1
  image_picker: 1.2.2

  # Utilities
  intl: 0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: 6.0.0
  build_runner: 2.15.0
  freezed: 3.2.6-dev.1
  json_serializable: 6.14.0
  riverpod_generator: 4.0.4-dev.1
  mocktail: 1.0.5

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/fonts/
    - assets/animations/
    - assets/configs/
